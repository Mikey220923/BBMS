{% extends "layout.html" %}

{% block content %}

<h1>All Registered Donors</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Blood Group</th>
        <th>Contact</th>
    </tr>

    {% for donor in donors %}
    <tr>
        <td>{{ donor[0] }}</td>
        <td>{{ donor[1] }}</td>
        <td>{{ donor[2] }}</td>
        <td>{{ donor[3] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
